<!doctype html>
<html>
<head>
<meta charset="utf8">
<title>Catan 3D — interaction dev</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(#123049,#0a1a28);overflow:hidden;font-family:system-ui}
  #app{position:fixed;inset:0}
  #info{position:fixed;top:8px;right:10px;color:#cfe;font:12px monospace;opacity:.75}
</style>
</head>
<body>
<div id="app"></div>
<div id="info">green rings = legal build spots · hover to highlight</div>
<script type="module">
import { BoardScene } from "../../extension/src/render/scene.js";
import { Forwarder } from "../../extension/src/interact/forward.js";

const raw = await (await fetch("./devstate.json")).json();
const objVals = (o) => Object.entries(o || {}).map(([idx, v]) => ({ index: Number(idx), ...v }));

// A state facade that also satisfies the Forwarder: corners/edges, phase fields, subscribe.
const subs = new Set();
const state = {
  ready: true,
  us: raw.us,
  robberTileIndex: raw.robber,
  // Force an "our-turn setup settlement" context so legal-settlement markers show.
  currentTurnColor: raw.us,
  turnState: 0,
  actionState: 1,
  completedTurns: 0,
  gameState: { mapState: raw.mapState, mechanicRobberState: { locationTileIndex: raw.robber } },
  get hexes() { return objVals(raw.mapState.tileHexStates); },
  get corners() { return objVals(raw.mapState.tileCornerStates); },
  get edges() { return objVals(raw.mapState.tileEdgeStates); },
  get ports() { return objVals(raw.mapState.portEdgeStates); },
  playerState: () => ({}),
  subscribe: (fn) => { subs.add(fn); return () => subs.delete(fn); },
};

const app = document.getElementById("app");
const scene = new BoardScene(app, { width: innerWidth, height: innerHeight });
scene.buildBoard(state);
scene.syncPieces(state);
// mount the interaction layer — legal markers appear for the forced setup context
const fwd = new Forwarder(scene, state, { send: { buildSettlement(){}, buildRoad(){}, sendGameAction(){} } });
window.addEventListener("resize", () => scene.resize(innerWidth, innerHeight));
window.__scene = scene; window.__fwd = fwd; window.__ready = true;
</script>
</body>
</html>
